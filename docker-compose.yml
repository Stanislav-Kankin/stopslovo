services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      LLM_MAX_TEXT_CHARS: ${LLM_MAX_TEXT_CHARS:-4000}
      LLM_MAX_FLAGGED_TERMS: ${LLM_MAX_FLAGGED_TERMS:-20}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost}
      AUTH_RATE_LIMIT_ATTEMPTS: ${AUTH_RATE_LIMIT_ATTEMPTS:-5}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      APP_ENV: ${APP_ENV:-production}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL:-https://localhost/pricing}
      YOOKASSA_WEBHOOK_SECRET: ${YOOKASSA_WEBHOOK_SECRET:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-stopslovo_supp@inbox.ru}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.mail.ru}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-СтопСлово <stopslovo_supp@inbox.ru>}
      SMTP_SSL: ${SMTP_SSL:-true}
      SMTP_TLS: ${SMTP_TLS:-false}
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
      BACKEND_URL: ${BACKEND_URL:-https://localhost}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@admin.ru}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    expose:
      - "8000"
    volumes:
      - backend_data:/app/app/data

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${SSL_CERT_PATH:-./deploy/certs/fullchain.pem}:/etc/nginx/certs/fullchain.pem:ro
      - ${SSL_KEY_PATH:-./deploy/certs/privkey.pem}:/etc/nginx/certs/privkey.pem:ro

volumes:
  backend_data:
