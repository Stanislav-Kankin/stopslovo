services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: build
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
